server:
  port: 8080

spring:
  application:
    name: ai-agent-platform
  profiles:
    active: dev
  config:
    import: optional:classpath:application-local.yml

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# LangChain4j 配置（API Key 可在 application-local.yml 中覆盖）
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:your-api-key}
      model-name: gpt-4o-mini
      temperature: 0.7
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${OPENAI_API_KEY:your-api-key}
      model-name: gpt-4o-mini
      temperature: 0.7

logging:
  level:
    com.ai.agentplatform: debug
    dev.langchain4j: info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
